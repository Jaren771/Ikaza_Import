# ============================================================
# ikaza-import-backend — Configuración de la aplicación
# ============================================================
# Aquí se conecta a la base de datos MySQL y se configura
# el puerto del servidor, JWT, etc.

server:
  port: 8081

spring:
  application:
    name: ikaza-import

  # --- Base de Datos PostgreSQL ---
  datasource:
    url: jdbc:postgresql://localhost:5432/ikaza_import_backend
    username: postgres
    password: ${DB_PASSWORD:180706}
    driver-class-name: org.postgresql.Driver

  # --- JPA / Hibernate ---
  jpa:
    hibernate:
      ddl-auto: update      # Crea/actualiza tablas automáticamente
    show-sql: false          # true para ver SQL en consola
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

# --- JWT (Json Web Token) para autenticación ---
jwt:
  secret: ${JWT_SECRET:IkazaImport2024SuperSecretKeyForJWTTokenGeneration}
  expiration: 86400000       # 24 horas en milisegundos
